<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Topology EDC - Agent First UI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <div>
        <h1>Investigate → Understand → Act</h1>
        <p>Agent-first orchestration demo (AG-UI / A2UI style)</p>
      </div>
      <div id="agent-status">Connecting…</div>
    </header>

    <main>
      <section class="workspace" id="workspace"></section>
      <aside class="rail">
        <section class="card">
          <h2>Input Channel</h2>
          <div class="actions">
            <button id="investigate-btn">Investigate selected node</button>
            <button id="suggest-btn">Ask for corrective action</button>
          </div>
          <form id="chat-form">
            <label for="chat-input">Refine request (chat is optional channel)</label>
            <input id="chat-input" type="text" placeholder="e.g. Focus on core routers" />
            <button type="submit">Send to agent</button>
          </form>
        </section>

        <section class="card">
          <h2>Agent protocol stream</h2>
          <pre id="event-log"></pre>
        </section>
      </aside>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
